<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      padding: 24px;
      color: #1e293b;
      background: #f8fafc;
    }
    h2 { font-size: 18px; margin-bottom: 16px; color: #0f172a; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    .field { margin-bottom: 18px; }
    input[type="file"] { font-size: 14px; }
    .hint { font-size: 12px; color: #64748b; margin-top: 4px; }
    .warn {
      background: #fef9c3;
      border-right: 3px solid #eab308;
      padding: 10px 12px;
      border-radius: 0 6px 6px 0;
      font-size: 12px;
      margin-bottom: 18px;
    }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #status {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    #status.success { display: block; background: #dcfce7; color: #166534; }
    #status.error { display: block; background: #fee2e2; color: #991b1b; }
    #status.loading { display: block; background: #dbeafe; color: #1e40af; }
  </style>
</head>
<body>
  <h2>📄 העלאת דוח הוצאות</h2>

  <div class="warn">
    שימו לב: העלאת קובץ חדש תחליף את כל הנתונים הקיימים בגיליון Expenses.
  </div>

  <div class="field">
    <label for="fileInput">קובץ הוצאות (Excel)</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="hint">הקובץ צריך להכיל: #, כרטיס, לקוח, תעודה, תאריך, מקט, פריט, כמות, מחיר...</div>
  </div>

  <button id="uploadBtn" onclick="handleUpload()">העלה</button>

  <div id="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    function setStatus(msg, type) {
      var el = document.getElementById('status');
      el.className = type;
      el.textContent = msg;
    }

    function handleUpload() {
      var fileInput = document.getElementById('fileInput');
      if (!fileInput.files || fileInput.files.length === 0) {
        setStatus('בחר קובץ Excel.', 'error');
        return;
      }

      var btn = document.getElementById('uploadBtn');
      btn.disabled = true;
      setStatus('קורא את הקובץ...', 'loading');

      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = new Uint8Array(e.target.result);
          var workbook = XLSX.read(data, { type: 'array', cellDates: true });
          var sheetName = workbook.SheetNames[0];
          var sheet = workbook.Sheets[sheetName];
          var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, dateNF: 'yyyy-mm-dd' });

          if (rows.length < 2) {
            setStatus('הקובץ ריק או מכיל רק כותרות.', 'error');
            btn.disabled = false;
            return;
          }

          // Ensure all rows have the same column count as header
          var numCols = rows[0].length;
          for (var i = 0; i < rows.length; i++) {
            while (rows[i].length < numCols) rows[i].push('');
          }

          setStatus('מעלה ' + (rows.length - 1) + ' שורות...', 'loading');

          google.script.run
            .withSuccessHandler(function(result) {
              if (result.success) {
                setStatus(result.message, 'success');
              } else {
                setStatus(result.message, 'error');
              }
              btn.disabled = false;
            })
            .withFailureHandler(function(err) {
              setStatus('שגיאה: ' + err.message, 'error');
              btn.disabled = false;
            })
            .importExpensesData(rows);
        } catch (ex) {
          setStatus('שגיאה בקריאת הקובץ: ' + ex.message, 'error');
          btn.disabled = false;
        }
      };
      reader.readAsArrayBuffer(fileInput.files[0]);
    }
  </script>
</body>
</html>
