<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      padding: 20px 22px;
      color: #1e293b;
      background: linear-gradient(180deg, #f0fdf4 0%, #f8fafc 35%);
      font-size: 14px;
      line-height: 1.5;
    }
    .intro {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e2e8f0;
    }
    .intro h1 {
      font-size: 20px;
      color: #14532d;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .intro p {
      font-size: 13px;
      color: #475569;
    }
    .step {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .step-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .step-num {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #16a34a;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .step-title {
      font-weight: 700;
      font-size: 15px;
      color: #0f172a;
    }
    .step-desc {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 10px;
    }
    input[type="file"] {
      font-size: 13px;
      width: 100%;
    }
    input[type="date"] {
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
      direction: ltr;
    }
    .week-badge {
      margin-top: 8px;
      padding: 8px 12px;
      background: #ecfdf5;
      border-radius: 8px;
      font-size: 13px;
      color: #166534;
      border: 1px solid #bbf7d0;
      display: none;
    }
    .week-badge.visible { display: block; }
    .btn-wrap {
      margin-top: 20px;
      text-align: center;
    }
    button.primary {
      background: #16a34a;
      color: #fff;
      border: none;
      padding: 14px 36px;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(22, 163, 74, .35);
      width: 100%;
      max-width: 320px;
    }
    button.primary:hover { background: #15803d; }
    button.primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
    }
    #status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      display: none;
      white-space: pre-line;
    }
    #status.loading {
      display: block;
      background: #dbeafe;
      color: #1e40af;
    }
    #status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    #status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="intro">
    <h1>השוואת מחירון להוצאות</h1>
    <p>מלאו את 3 השלבים ולחצו על הכפתור הירוק</p>
  </div>

  <div class="step">
    <div class="step-head">
      <span class="step-num">1</span>
      <span class="step-title">קובץ מחירון מהספק</span>
    </div>
    <div class="step-desc">Excel עם עמודות: מקט, פריט, מחירון</div>
    <input type="file" id="pricingFile" accept=".xlsx,.xls">
    <div class="hint">קובץ Excel שהספק שולח עם המחירים</div>
  </div>

  <div class="step">
    <div class="step-head">
      <span class="step-num">2</span>
      <span class="step-title">מתי המחירון הזה רלוונטי?</span>
    </div>
    <div class="step-desc">בחרו תאריך — המערכת תחשב את השבוע אוטומטית</div>
    <input type="date" id="pricingDate">
    <div id="weekBadge" class="week-badge"></div>
  </div>

  <div class="step">
    <div class="step-head">
      <span class="step-num">3</span>
      <span class="step-title">קובץ דוח הוצאות</span>
    </div>
    <div class="step-desc">Excel עם כל רכישות החודש (כמו שקיבלתם מהספק)</div>
    <input type="file" id="expensesFile" accept=".xlsx,.xls">
  </div>

  <div class="btn-wrap">
    <button type="button" class="primary" id="runBtn" onclick="runComparison()">השווה עכשיו</button>
  </div>

  <div id="status"></div>

  <script>
    /** SheetJS — ניסיון טעינה משני מקורות CDN */
    function ensureXlsxLoaded(done) {
      if (typeof XLSX !== 'undefined') {
        done(true);
        return;
      }
      var urls = [
        'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
        'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
      ];
      var i = 0;
      function tryNext() {
        if (typeof XLSX !== 'undefined') {
          done(true);
          return;
        }
        if (i >= urls.length) {
          done(false);
          return;
        }
        var sc = document.createElement('script');
        sc.async = true;
        sc.src = urls[i++];
        sc.onload = function() {
          if (typeof XLSX !== 'undefined') done(true);
          else tryNext();
        };
        sc.onerror = function() { tryNext(); };
        document.head.appendChild(sc);
      }
      tryNext();
    }

    ensureXlsxLoaded(function(ok) {
      var runBtn = document.getElementById('runBtn');
      if (!ok) {
        runBtn.disabled = true;
        var st = document.getElementById('status');
        st.className = 'error';
        st.style.display = 'block';
        st.textContent = 'טעינה לא הושלמה — סגרו את החלון ופתחו שוב מהתפריט.';
      }
    });

    function pad2(n) {
      return (n < 10 ? '0' : '') + n;
    }
    function todayIso() {
      var d = new Date();
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    document.getElementById('pricingDate').value = todayIso();

    function updateWeekBadge() {
      var iso = document.getElementById('pricingDate').value;
      var badge = document.getElementById('weekBadge');
      if (!iso) {
        badge.className = 'week-badge';
        return;
      }
      google.script.run
        .withSuccessHandler(function(weekStr) {
          badge.textContent = 'המחירון יירשם לשבוע: ' + weekStr;
          badge.className = 'week-badge visible';
        })
        .withFailureHandler(function() {
          badge.className = 'week-badge';
        })
        .getISOWeekFromIsoDateString(iso);
    }

    document.getElementById('pricingDate').addEventListener('change', updateWeekBadge);
    updateWeekBadge();

    function setStatus(msg, type) {
      var el = document.getElementById('status');
      el.className = type;
      el.textContent = msg;
    }

    function toSafeValue(v) {
      if (v === undefined || v === null) return '';
      if (v instanceof Date) {
        var y = v.getFullYear();
        var m = pad2(v.getMonth() + 1);
        var d = pad2(v.getDate());
        return y + '-' + m + '-' + d;
      }
      return v;
    }

    function normalizeRows(rows) {
      if (!rows || !rows.length) return rows;
      var maxCols = 0;
      var i, j;
      for (i = 0; i < rows.length; i++) {
        if (rows[i] && rows[i].length > maxCols) maxCols = rows[i].length;
      }
      for (i = 0; i < rows.length; i++) {
        if (!rows[i]) rows[i] = [];
        while (rows[i].length < maxCols) rows[i].push('');
        for (j = 0; j < rows[i].length; j++) {
          rows[i][j] = toSafeValue(rows[i][j]);
        }
      }
      return rows;
    }

    function parseSheet(file, cb) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = new Uint8Array(e.target.result);
          var workbook = XLSX.read(data, { type: 'array', cellDates: true });
          var sheetName = workbook.SheetNames[0];
          var sheet = workbook.Sheets[sheetName];
          var rows = XLSX.utils.sheet_to_json(sheet, {
            header: 1,
            raw: false,
            dateNF: 'yyyy-mm-dd'
          });
          rows = normalizeRows(rows);
          cb(null, rows);
        } catch (ex) {
          cb(ex);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function runComparison() {
      if (typeof XLSX === 'undefined') {
        setStatus('לא ניתן לקרוא את הקובץ כרגע — סגרו את החלון ופתחו שוב מהתפריט.', 'error');
        return;
      }

      var pf = document.getElementById('pricingFile').files;
      var ef = document.getElementById('expensesFile').files;
      var isoDate = document.getElementById('pricingDate').value;

      if (!pf || !pf.length) {
        setStatus('נא לבחור קובץ מחירון (שלב 1)', 'error');
        return;
      }
      if (!ef || !ef.length) {
        setStatus('נא לבחור קובץ הוצאות (שלב 3)', 'error');
        return;
      }
      if (!isoDate) {
        setStatus('נא לבחור תאריך (שלב 2)', 'error');
        return;
      }

      var btn = document.getElementById('runBtn');
      btn.disabled = true;
      setStatus('טוען קבצים ומריץ השוואה...\nזה עלול לקחת כמה שניות.', 'loading');

      parseSheet(pf[0], function(errP, pricingRows) {
        if (errP) {
          setStatus('שגיאה בקריאת המחירון: ' + errP.message, 'error');
          btn.disabled = false;
          return;
        }
        parseSheet(ef[0], function(errE, expenseRows) {
          if (errE) {
            setStatus('שגיאה בקריאת ההוצאות: ' + errE.message, 'error');
            btn.disabled = false;
            return;
          }

          google.script.run
            .withSuccessHandler(function(result) {
              btn.disabled = false;
              if (result.success) {
                setStatus(result.message, 'success');
              } else {
                setStatus(result.message, 'error');
              }
            })
            .withFailureHandler(function(err) {
              setStatus('שגיאה: ' + err.message, 'error');
              btn.disabled = false;
            })
            .runFullComparison(isoDate, pricingRows, expenseRows);
        });
      });
    }
  </script>
</body>
</html>
