<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      padding: 20px 22px;
      color: #1e293b;
      background: linear-gradient(180deg, #f0fdf4 0%, #f8fafc 35%);
      font-size: 14px;
      line-height: 1.5;
    }
    .intro {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e2e8f0;
    }
    .intro h1 {
      font-size: 20px;
      color: #14532d;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .intro p {
      font-size: 13px;
      color: #475569;
    }
    .step {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .step-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .step-num {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #16a34a;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .step-title {
      font-weight: 700;
      font-size: 15px;
      color: #0f172a;
    }
    .step-desc {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 10px;
    }
    .pricing-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pricing-item {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      background: #f8fafc;
    }
    .pricing-item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .pricing-item-title {
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }
    .pricing-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .tiny-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #475569;
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .tiny-btn:hover { background: #f1f5f9; }
    .tiny-btn.remove {
      border-color: #fecaca;
      color: #b91c1c;
      background: #fff1f2;
    }
    .tiny-btn.remove:hover { background: #ffe4e6; }
    input[type="file"] {
      font-size: 13px;
      width: 100%;
    }
    input[type="date"] {
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
      direction: ltr;
    }
    .week-badge {
      margin-top: 8px;
      padding: 8px 12px;
      background: #ecfdf5;
      border-radius: 8px;
      font-size: 13px;
      color: #166534;
      border: 1px solid #bbf7d0;
      display: none;
    }
    .week-badge.visible { display: block; }
    .btn-wrap {
      margin-top: 20px;
      text-align: center;
    }
    button.primary {
      background: #16a34a;
      color: #fff;
      border: none;
      padding: 14px 36px;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(22, 163, 74, .35);
      width: 100%;
      max-width: 320px;
    }
    button.primary:hover { background: #15803d; }
    button.primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
    }
    #status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      display: none;
      white-space: pre-line;
    }
    #status.loading {
      display: block;
      background: #dbeafe;
      color: #1e40af;
    }
    #status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    #status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .hint {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="intro">
    <h1>🥕 השוואת מחירון להוצאות</h1>
    <p>מלאו את 3 השלבים ולחצו על הכפתור הירוק</p>
  </div>

  <div class="step">
    <div class="step-head">
      <span class="step-num">1</span>
      <span class="step-title">📦 מחירונים מהספק (1 עד 5 קבצים)</span>
    </div>
    <div class="step-desc">אפשר להעלות מחירון אחד, או כמה (לרוב 4-5 לחודש). לכל מחירון בוחרים תאריך משלו.</div>
    <div id="pricingList" class="pricing-list"></div>
    <button type="button" class="tiny-btn" id="addPricingBtn">+ 🍏 הוסף מחירון נוסף</button>
    <div class="hint">בכל מחירון: עמודות מקט, פריט, מחירון</div>
  </div>

  <div class="step">
    <div class="step-head">
      <span class="step-num">2</span>
      <span class="step-title">🧾 קובץ דוח הוצאות</span>
    </div>
    <div class="step-desc">Excel עם כל רכישות החודש (כמו שקיבלתם מהספק)</div>
    <input type="file" id="expensesFile" accept=".xlsx,.xls">
  </div>

  <div class="btn-wrap">
    <button type="button" class="primary" id="runBtn" onclick="runComparison()">🧮 בצע השוואה</button>
  </div>

  <div id="status"></div>

  <script>
    /** SheetJS — ניסיון טעינה משני מקורות CDN */
    function ensureXlsxLoaded(done) {
      if (typeof XLSX !== 'undefined') {
        done(true);
        return;
      }
      var urls = [
        'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
        'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
      ];
      var i = 0;
      function tryNext() {
        if (typeof XLSX !== 'undefined') {
          done(true);
          return;
        }
        if (i >= urls.length) {
          done(false);
          return;
        }
        var sc = document.createElement('script');
        sc.async = true;
        sc.src = urls[i++];
        sc.onload = function() {
          if (typeof XLSX !== 'undefined') done(true);
          else tryNext();
        };
        sc.onerror = function() { tryNext(); };
        document.head.appendChild(sc);
      }
      tryNext();
    }

    ensureXlsxLoaded(function(ok) {
      var runBtn = document.getElementById('runBtn');
      if (!ok) {
        runBtn.disabled = true;
        var st = document.getElementById('status');
        st.className = 'error';
        st.style.display = 'block';
        st.textContent = 'טעינה לא הושלמה — סגרו את החלון ופתחו שוב מהתפריט.';
      }
    });

    function pad2(n) {
      return (n < 10 ? '0' : '') + n;
    }
    function todayIso() {
      var d = new Date();
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    var pricingCounter = 0;
    var MAX_PRICING_FILES = 5;

    function createPricingItem() {
      pricingCounter += 1;
      var idx = pricingCounter;
      var wrap = document.createElement('div');
      wrap.className = 'pricing-item';
      wrap.setAttribute('data-pricing-id', String(idx));
      wrap.innerHTML =
        '<div class="pricing-item-head">' +
          '<span class="pricing-item-title">מחירון ' + idx + '</span>' +
          '<button type="button" class="tiny-btn remove" data-action="remove">🗑️ הסר</button>' +
        '</div>' +
        '<div class="pricing-grid">' +
          '<input type="file" class="pricing-file" accept=".xlsx,.xls">' +
          '<input type="date" class="pricing-date">' +
          '<div class="week-badge"></div>' +
        '</div>';

      var dateInput = wrap.querySelector('.pricing-date');
      dateInput.value = todayIso();

      var removeBtn = wrap.querySelector('[data-action="remove"]');
      removeBtn.onclick = function() {
        var list = document.getElementById('pricingList');
        if (list.children.length === 1) {
          setStatus('חייב להיות לפחות מחירון אחד.', 'error');
          return;
        }
        wrap.remove();
        refreshPricingTitles();
      };

      dateInput.addEventListener('change', function() {
        updateWeekBadgeForItem(wrap);
      });
      updateWeekBadgeForItem(wrap);

      return wrap;
    }

    function refreshPricingTitles() {
      var list = document.getElementById('pricingList');
      var items = list.querySelectorAll('.pricing-item');
      var i;
      for (i = 0; i < items.length; i++) {
        items[i].querySelector('.pricing-item-title').textContent = 'מחירון ' + (i + 1);
      }
      document.getElementById('addPricingBtn').disabled = items.length >= MAX_PRICING_FILES;
    }

    function updateWeekBadgeForItem(itemEl) {
      var iso = itemEl.querySelector('.pricing-date').value;
      var badge = itemEl.querySelector('.week-badge');
      if (!iso) {
        badge.className = 'week-badge';
        return;
      }
      google.script.run
        .withSuccessHandler(function(rangeLabel) {
          badge.textContent = 'טווח התאריכים שייבחר: ' + rangeLabel;
          badge.className = 'week-badge visible';
        })
        .withFailureHandler(function() {
          badge.className = 'week-badge';
        })
        .getWeekRangeLabelFromIsoDateStringFull(iso);
    }

    function initPricingList() {
      var list = document.getElementById('pricingList');
      list.appendChild(createPricingItem());
      refreshPricingTitles();
      document.getElementById('addPricingBtn').onclick = function() {
        var count = list.querySelectorAll('.pricing-item').length;
        if (count >= MAX_PRICING_FILES) return;
        list.appendChild(createPricingItem());
        refreshPricingTitles();
      };
    }

    function setStatus(msg, type) {
      var el = document.getElementById('status');
      el.className = type;
      el.textContent = msg;
    }

    function toSafeValue(v) {
      if (v === undefined || v === null) return '';
      if (v instanceof Date) {
        var y = v.getFullYear();
        var m = pad2(v.getMonth() + 1);
        var d = pad2(v.getDate());
        return y + '-' + m + '-' + d;
      }
      return v;
    }

    function normalizeRows(rows) {
      if (!rows || !rows.length) return rows;
      var maxCols = 0;
      var i, j;
      for (i = 0; i < rows.length; i++) {
        if (rows[i] && rows[i].length > maxCols) maxCols = rows[i].length;
      }
      for (i = 0; i < rows.length; i++) {
        if (!rows[i]) rows[i] = [];
        while (rows[i].length < maxCols) rows[i].push('');
        for (j = 0; j < rows[i].length; j++) {
          rows[i][j] = toSafeValue(rows[i][j]);
        }
      }
      return rows;
    }

    function parseSheet(file, cb) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = new Uint8Array(e.target.result);
          var workbook = XLSX.read(data, { type: 'array', cellDates: true });
          var sheetName = workbook.SheetNames[0];
          var sheet = workbook.Sheets[sheetName];
          var rows = XLSX.utils.sheet_to_json(sheet, {
            header: 1,
            raw: false,
            dateNF: 'yyyy-mm-dd'
          });
          rows = normalizeRows(rows);
          cb(null, rows);
        } catch (ex) {
          cb(ex);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function runComparison() {
      if (typeof XLSX === 'undefined') {
        setStatus('לא ניתן לקרוא את הקובץ כרגע — סגרו את החלון ופתחו שוב מהתפריט.', 'error');
        return;
      }

      var ef = document.getElementById('expensesFile').files;
      if (!ef || !ef.length) {
        setStatus('נא לבחור קובץ הוצאות (שלב 2)', 'error');
        return;
      }

      var btn = document.getElementById('runBtn');
      btn.disabled = true;
      var pricingItems = document.querySelectorAll('.pricing-item');
      var entries = [];
      var idx = 0;

      function parseNextPricing() {
        if (idx >= pricingItems.length) {
          parseSheet(ef[0], function(errE, expenseRows) {
            if (errE) {
              setStatus('שגיאה בקריאת ההוצאות: ' + errE.message, 'error');
              btn.disabled = false;
              return;
            }
            google.script.run
              .withSuccessHandler(function(result) {
                btn.disabled = false;
                if (result.success) {
                setStatus(result.message + '\n\n🎉 ההשוואה הסתיימה בהצלחה. החלון ייסגר אוטומטית.', 'success');
                setTimeout(function() {
                  google.script.host.close();
                }, 1700);
                } else {
                  setStatus(result.message, 'error');
                }
              })
              .withFailureHandler(function(err) {
                setStatus('שגיאה: ' + err.message, 'error');
                btn.disabled = false;
              })
              .runFullComparisonBatch(entries, expenseRows);
          });
          return;
        }

        var item = pricingItems[idx];
        var fileInput = item.querySelector('.pricing-file');
        var dateInput = item.querySelector('.pricing-date');
        var fileList = fileInput.files;
        var isoDate = dateInput.value;

        if (!fileList || !fileList.length) {
          setStatus('נא לבחור קובץ עבור מחירון ' + (idx + 1) + '.', 'error');
          btn.disabled = false;
          return;
        }
        if (!isoDate) {
          setStatus('נא לבחור תאריך עבור מחירון ' + (idx + 1) + '.', 'error');
          btn.disabled = false;
          return;
        }

        parseSheet(fileList[0], function(errP, pricingRows) {
          if (errP) {
            setStatus('שגיאה בקריאת מחירון ' + (idx + 1) + ': ' + errP.message, 'error');
            btn.disabled = false;
            return;
          }
          entries.push({
            isoDateStr: isoDate,
            pricingRows: pricingRows
          });
          idx += 1;
          parseNextPricing();
        });
      }

      setStatus('טוען מחירונים והוצאות...\nזה עלול לקחת כמה שניות.', 'loading');
      parseNextPricing();
    }

    initPricingList();
  </script>
</body>
</html>
